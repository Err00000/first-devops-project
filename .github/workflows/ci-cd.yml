name: DevOps pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod sursa
        uses: actions/checkout@v3
      - name: Setare mediu python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: instalare dependinte
        run: pip install -r requirements.txt
      - name: rulare test
        run: pytest test_app.py
      - name: Login la docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_NAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build si push imagine Docker
        run: |
          docker build -t ${{ secrets.DOCKER_NAME }}/hello-devops:v1 .
          docker push ${{ secrets.DOCKER_NAME }}/hello-devops:v1