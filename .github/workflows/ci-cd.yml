name: DevOps pipeline
on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
  runs-on: ubuntu-latest

  steps:
  - name: Checkout cod sursa
    uses: actions/checkout@v3

  - name: Login la docker
    uses: docker/login-action@v2
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}
  
  - name: Build si push imagine Docker
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/hello-devops:v1 .
      docker push ${{ secrets.DOCKER_USERNAME }}/hello-devops:v1